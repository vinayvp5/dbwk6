<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — TaskFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060710;
      --card:     #0d0e1c;
      --border:   #191b2e;
      --accent:   #4f8ef7;
      --purple:   #a78bfa;
      --text:     #e8eaf6;
      --muted:    #4e5170;
      --success:  #34d399;
      --error:    #f87171;
      --radius:   13px;
    }

    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.03) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(90px);
    }
    .orb-1 { width:400px; height:400px; background:rgba(79,142,247,.12); top:-160px; left:-100px; animation: fl 10s ease-in-out infinite alternate; }
    .orb-2 { width:340px; height:340px; background:rgba(167,139,250,.10); bottom:-120px; right:-80px; animation: fl 13s ease-in-out infinite alternate-reverse; }
    @keyframes fl { to { transform: translate(30px, 20px); } }

    .card {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 44px 40px 40px;
      box-shadow: 0 0 0 1px rgba(255,255,255,.03), 0 32px 72px rgba(0,0,0,.6);
      animation: rise .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);   }
    }

    .brand { display:flex; align-items:center; gap:10px; margin-bottom:30px; }
    .brand-icon {
      width:36px; height:36px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:17px;
    }
    .brand-name { font-size:19px; font-weight:700; }
    .brand-name span { color: var(--accent); }

    h1 { font-size:24px; font-weight:700; letter-spacing:-.4px; margin-bottom:5px; }
    .sub { font-size:14px; color:var(--muted); margin-bottom:26px; }

    .alert {
      display: none;
      align-items: center; gap: 9px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13.5px; font-weight: 500;
      margin-bottom: 18px;
      border: 1px solid;
    }
    .alert.error {
      display: flex;
      background: rgba(248,113,113,.07);
      border-color: rgba(248,113,113,.25);
      color: var(--error);
      animation: shake .3s ease;
    }
    .alert.success {
      display: flex;
      background: rgba(52,211,153,.07);
      border-color: rgba(52,211,153,.25);
      color: var(--success);
    }
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      30%    { transform:translateX(-7px); }
      70%    { transform:translateX(7px); }
    }

    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .ico {
      position: absolute; left:13px; top:50%;
      transform: translateY(-50%);
      font-size:15px; opacity:.4; pointer-events:none;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 13px 13px 41px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,.14);
    }
    input::placeholder { color:var(--muted); opacity:.5; }

    .btn {
      width: 100%; margin-top: 6px;
      background: linear-gradient(135deg, var(--accent), #3a72e0);
      color: #fff; border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 22px rgba(79,142,247,.28);
      transition: opacity .2s, transform .15s, box-shadow .2s;
    }
    .btn:hover:not(:disabled) {
      opacity: .88; transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(79,142,247,.4);
    }
    .btn:disabled { opacity:.5; cursor:not-allowed; }

    .spinner {
      display: none;
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .rule { height:1px; background:var(--border); margin:24px 0; }
    .foot { text-align:center; font-size:14px; color:var(--muted); }
    .foot a { color:var(--accent); font-weight:600; text-decoration:none; }
    .foot a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div class="brand-name">Task<span>Flow</span></div>
    </div>

    <h1>Create your account</h1>
    <p class="sub">Fill in your details to get started.</p>

    <!-- Alert -->
    <div class="alert" id="alert">
      <span id="alertIcon"></span>
      <span id="alertMsg"></span>
    </div>

    <!-- Name -->
    <div class="field">
      <label>Full Name</label>
      <div class="input-wrap">
        <span class="ico">👤</span>
        <input type="text" id="name" placeholder="John Doe" autocomplete="name"/>
      </div>
    </div>

    <!-- Email -->
    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="ico">✉️</span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="ico">🔑</span>
        <input type="password" id="password" placeholder="Minimum 6 characters" autocomplete="new-password"/>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn" id="btn" onclick="handleSignup()">
      <span id="btnText">Create Account</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="rule"></div>
    <p class="foot">Already have an account? <a href="login.html">Sign in →</a></p>
  </div>

  <script src="script.js"></script>
  <script>
    async function handleSignup() {
      const name     = document.getElementById("name").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      // Validation
      if (!name)                        return showAlert("Please enter your full name.", "error");
      if (!email)                       return showAlert("Please enter your email.", "error");
      if (!/\S+@\S+\.\S+/.test(email))  return showAlert("Enter a valid email address.", "error");
      if (!password)                    return showAlert("Please enter a password.", "error");
      if (password.length < 6)          return showAlert("Password must be at least 6 characters.", "error");

      setLoading(true);
      try {
        console.log("📤 Posting to /auth/register...");
        
        // ✅ POST /auth/register  →  sends name, email, password to MongoDB
        const res  = await fetch(API_BASE + "/auth/register", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        console.log("📨 Response:", data);

        if (res.ok) {
          console.log("✅ Account created successfully");
          showAlert("Account created! Redirecting to login...", "success");
          setTimeout(() => window.location.href = "login.html", 1800);
        } else {
          showAlert(data.message || "Registration failed. Try again.", "error");
        }
      } catch (err) {
        console.error("❌ Error:", err);
        showAlert("Server not reachable. Is it running on port 3000?", "error");
      } finally {
        setLoading(false);
      }
    }

    // Allow Enter key
    document.addEventListener("keydown", e => { if (e.key === "Enter") handleSignup(); });
  </script>
</body>
</html>
